{% extends 'base.html' %}

{% block content %}
<header class="main-header">
    <div class="header-content">
        <div class="header-top">
            <a href="{% url 'farm_products:product_list' %}"
                style="text-decoration: none; color: white; display: flex; align-items: center; gap: 10px;">
                <i class="fa-solid fa-arrow-left"></i>
                <h1>Silmək</h1>
            </a>
        </div>
    </div>
</header>

<main class="main-content">
    <div style="background: white; padding: 20px; border-radius: 20px; text-align: center;">
        <p style="margin-bottom: 20px; font-size: 16px;">
            <strong>{{ product.item.name|default:product.manual_name }}</strong> məhsulunu silmək istədiyinizə
            əminsiniz?
        </p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="add-new-btn" style="background-color: #dc3545; margin-bottom: 10px;">
                Bəli, Sil
            </button>
            <a href="{% url 'farm_products:product_list' %}" class="back-btn-box"
                style="background-color: #6c757d; text-decoration: none;">
                Xeyr, Geri Qayıt
            </a>
        </form>
    </div>
</main>
{% endblock %}
