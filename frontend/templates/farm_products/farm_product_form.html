{% extends 'base.html' %}
{% block content %}
<header class="main-header">
    <div class="header-content">
        <div class="header-top">
            <a href="{% url 'farm_products:product_list' %}" class="back-btn-box">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Məhsulu Düzəlt</span>
            </a>
        </div>
    </div>
</header>

<main class="main-content" style="margin-top: -20px; position: relative; z-index: 10;">
    <div class="form-container-white">
        <h3 style="font-size: 20px; font-weight: 700; margin-bottom: 20px;">Məhsul Məlumatlarını Yenilə</h3>

        <form method="POST" id="farm-product-form" data-sync-entity="farm_product" data-sync-action="update" data-sync-reset="false">
            {% csrf_token %}
            <input type="hidden" name="record_id" value="{{ product.pk }}">
            <input type="hidden" name="record_version" value="{{ product.updated_at|date:'c' }}">
            <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Ana Kateqoriya <span style="color: #dc3545;">*</span></label>
                    <select id="category-select" name="category" required class="custom-input">
                        <option value="" disabled>Kateqoriya seçin</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if product.item and product.item.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group" id="item-field-group" {% if not product.item %}style="display: none;" {% endif %}>
                    <label>Məhsul Növü <span style="color: #dc3545;">*</span></label>
                    <select id="item-select" name="item" required class="custom-input" {% if not product.item %}disabled{% endif %}>
                        <option value="" disabled>Məhsul seçin</option>
                        {% if product.item %}
                        {% for item in product.item.category.items.all %}
                        <option value="{{ item.id }}" data-name="{{ item.name }}" data-unit="{{ item.unit|default:'' }}"
                            {% if product.item_id == item.id %}selected{% endif %}>
                            {{ item.name }}
                        </option>
                        {% endfor %}
                        {% endif %}
                    </select>
                </div>

                <div class="form-group" id="manual-name-group"
                    {% if product.item and product.item.name != "Digər" %}style="display: none;" {% endif %}>
                    <label>Məhsulun Adı (Digər) <span style="color: #dc3545;">*</span></label>
                    <input type="text" name="manual_name" id="manual-name-input" placeholder="Məhsulun adını daxil edin"
                        class="custom-input" value="{{ product.manual_name|default:'' }}">
                </div>
            </div>

            <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Miqdar <span style="color: #dc3545;">*</span></label>
                    <input type="number" name="quantity" step="0.01" placeholder="0.00" class="custom-input" required
                        value="{{ product.quantity|stringformat:'.2f' }}">
                </div>
                <div class="form-group">
                    <label>Ölçü Vahidi <span style="color: #dc3545;">*</span></label>
                    <select name="unit" id="unit-select" class="custom-input" required>
                        <option value="kq" {% if product.unit == 'kq' %}selected{% endif %}>kq</option>
                        <option value="ton" {% if product.unit == 'ton' %}selected{% endif %}>ton</option>
                        <option value="qram" {% if product.unit == 'qram' %}selected{% endif %}>qram</option>
                        <option value="litr" {% if product.unit == 'litr' %}selected{% endif %}>litr</option>
                        <option value="ml" {% if product.unit == 'ml' %}selected{% endif %}>millilitr</option>
                        <option value="ədəd" {% if product.unit == 'ədəd' %}selected{% endif %}>ədəd</option>
                        <option value="dəstə" {% if product.unit == 'dəstə' %}selected{% endif %}>dəstə</option>
                        <option value="bağlama" {% if product.unit == 'bağlama' %}selected{% endif %}>bağlama</option>
                    </select>
                    <input type="hidden" id="unit-hidden" name="unit_disabled" value="">
                </div>
            </div>

            <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Məbləğ (₼)</label>
                    <input type="number" name="price" step="0.01" placeholder="0.00" class="custom-input"
                        value="{{ product.price|stringformat:'.2f' }}">
                </div>
                <div class="form-group">
                    <label>Tarix <span style="color: #dc3545;">*</span></label>
                    <input type="date" name="date" required value="{{ product.date|date:'Y-m-d' }}"
                        class="custom-input">
                </div>
            </div>

            <div class="form-group">
                <label>Əlavə Məlumat</label>
                <textarea name="additional_info" placeholder="Məsələn: Məhsulun vəziyyəti və s." class="custom-input"
                    rows="3">{{ product.additional_info|default:'' }}</textarea>
            </div>

            <button type="submit" class="add-expense-btn">
                <i class="fa-solid fa-save"></i>
                <span>Yadda Saxla</span>
            </button>
        </form>
    </div>
</main>

<script>
    const manualGroup = document.getElementById("manual-name-group");
    const manualInput = document.getElementById("manual-name-input");
    const unitSelect = document.getElementById("unit-select");
    const unitHidden = document.getElementById("unit-hidden");

    const ALL_UNITS = ["kq", "ton", "qram", "litr", "ml", "ədəd", "dəstə", "bağlama"];
    const UNIT_LABELS = {
        kq: "kq",
        ton: "ton",
        qram: "qram",
        litr: "litr",
        ml: "millilitr",
        "ədəd": "ədəd",
        "dəstə": "dəstə",
        "bağlama": "bağlama",
    };

    function applyUnitOptions(allowed, defaultValue) {
        if (!unitSelect) return;
        unitSelect.innerHTML = "";
        allowed.forEach(value => {
            const option = document.createElement("option");
            option.value = value;
            option.textContent = UNIT_LABELS[value] || value;
            unitSelect.appendChild(option);
        });
        if (defaultValue && allowed.includes(defaultValue)) {
            unitSelect.value = defaultValue;
        } else if (allowed.length) {
            unitSelect.value = allowed[0];
        }
    }

    function setUnitForItem(unitValue, isLocked, allowedUnits) {
        if (!unitSelect) return;
        if (allowedUnits && allowedUnits.length) {
            applyUnitOptions(allowedUnits, unitValue);
        } else if (unitValue) {
            unitSelect.value = unitValue;
        }
        unitSelect.disabled = isLocked;
        if (unitHidden) {
            if (isLocked) {
                unitSelect.name = "unit_disabled";
                unitHidden.name = "unit";
                unitHidden.value = unitSelect.value || unitValue || "";
            } else {
                unitSelect.name = "unit";
                unitHidden.name = "unit_disabled";
                unitHidden.value = "";
            }
        }
        if (!unitSelect.options.length && allowedUnits && allowedUnits.length) {
            applyUnitOptions(allowedUnits, unitValue);
        }
    }

    function handleItemSelection(option) {
        const itemName = option?.dataset?.name || "";
        const itemUnit = option?.dataset?.unit || "";
        const isOther = itemName === "Digər" || !itemUnit;
        let allowed = ALL_UNITS;
        let lockUnit = false;

        const isForage = ["yonca", "koronilla", "seradella"].includes(itemName.toLowerCase());
        if (isForage) {
            allowed = ["kq", "bağlama"];
        } else if (itemUnit === "kq") {
            allowed = ["kq", "ton", "qram"];
        } else if (itemUnit === "litr") {
            allowed = ["litr", "ml"];
        } else if (itemUnit) {
            allowed = [itemUnit];
            lockUnit = true;
        }

        if (isOther) {
            manualGroup.style.display = "block";
            manualInput.required = true;
            if (!unitSelect.value) unitSelect.value = "kq";
            setUnitForItem(unitSelect.value, false, ALL_UNITS);
        } else {
            manualGroup.style.display = "none";
            manualInput.required = false;
            manualInput.value = "";
            setUnitForItem(itemUnit, lockUnit, allowed);
        }
    }

    document.getElementById("category-select").addEventListener("change", function () {
        const categoryId = this.value;
        const categoryText = this.options[this.selectedIndex]?.text || "";
        const itemSelect = document.getElementById("item-select");
        const itemGroup = document.getElementById("item-field-group");

        if (categoryText.startsWith("Digər")) {
            itemGroup.style.display = "none";
            itemSelect.required = false;
            itemSelect.disabled = true;
            itemSelect.innerHTML = '<option value="" disabled selected>Alt kateqoriya yoxdur</option>';
            manualGroup.style.display = "block";
            manualInput.required = true;
            setUnitForItem("kq", false, ALL_UNITS);
            return;
        }

        itemGroup.style.display = "block";
        itemSelect.required = true;
        itemSelect.disabled = true;
        itemSelect.innerHTML = '<option value="" disabled selected>Yüklənir...</option>';

        fetch(`{% url 'farm_products:get_items' %}?category_id=${categoryId}`)
            .then(response => response.json())
            .then(data => {
                itemSelect.innerHTML = '<option value="" disabled selected>Məhsul seçin</option>';
                data.forEach(item => {
                    const option = document.createElement("option");
                    option.value = item.id;
                    option.textContent = item.name;
                    option.dataset.name = item.name;
                    option.dataset.unit = item.unit || "";
                    itemSelect.appendChild(option);
                });
                itemSelect.disabled = false;
                const selectedOption = itemSelect.options[itemSelect.selectedIndex];
                if (selectedOption && selectedOption.value) {
                    handleItemSelection(selectedOption);
                } else {
                    manualGroup.style.display = "none";
                    manualInput.required = false;
                    setUnitForItem("kq", false, ALL_UNITS);
                }
            })
            .catch(error => {
                console.error("Error fetching farm product items:", error);
                itemSelect.innerHTML = '<option value="" disabled selected>Xəta baş verdi</option>';
            });
    });

    document.getElementById("item-select").addEventListener("change", function () {
        const selectedOption = this.options[this.selectedIndex];
        handleItemSelection(selectedOption);
    });

    (function initSelection() {
        const itemSelect = document.getElementById("item-select");
        const categorySelect = document.getElementById("category-select");
        const categoryText = categorySelect?.options[categorySelect.selectedIndex]?.text || "";
        if (categoryText.startsWith("Digər")) {
            const itemGroup = document.getElementById("item-field-group");
            itemGroup.style.display = "none";
            itemSelect.required = false;
            itemSelect.disabled = true;
            manualGroup.style.display = "block";
            manualInput.required = true;
            setUnitForItem("kq", false, ALL_UNITS);
            return;
        }
        if (itemSelect && itemSelect.value) {
            handleItemSelection(itemSelect.options[itemSelect.selectedIndex]);
        }
    })();
</script>
{% endblock %}
